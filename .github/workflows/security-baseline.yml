name: Security Baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review (license compliance)
        if: github.event_name == 'pull_request' && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          license-check: true
          vulnerability-check: false
          warn-only: true

      - name: Gitleaks (secrets scan)
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
            --source . \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 0

      - name: Upload Gitleaks report
        if: always() && hashFiles('gitleaks-report.json') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

      - name: OSV-Scanner (dependency vulnerabilities)
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v1.7.1
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            .

      - name: Upload OSV SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: osv-results
          path: osv-results.sarif
          retention-days: 30

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 30

      - name: Trivy config scan (IaC / Docker / Kubernetes)
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif

      - name: Upload Trivy config SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config
          path: trivy-config.sarif
          retention-days: 30
